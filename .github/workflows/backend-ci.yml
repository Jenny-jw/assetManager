name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run pytest
        env:
          JWT_SECRET_KEY: ci-test-secret-key
          JWT_ALGORITHM: HS256
          JWT_COOKIE_SECURE: "false"
        run: pytest -v

  compose-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start api and mongo
        run: docker compose up -d --build --wait

      - name: Smoke check health endpoints
        run: |
          set -euo pipefail
          for endpoint in health ready; do
            for attempt in $(seq 1 15); do
              if curl -fsS "http://localhost:8000/${endpoint}"; then
                echo
                break
              fi
              if [ "${attempt}" -eq 15 ]; then
                echo "::error::${endpoint} check failed after ${attempt} attempts"
                docker compose ps
                docker compose logs api --tail 100
                exit 1
              fi
              echo "Waiting for /${endpoint} (attempt ${attempt}/15)..."
              sleep 2
            done
          done

      - name: Tear down stack
        if: always()
        run: docker compose down -v
